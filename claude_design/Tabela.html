<title>Tabela — The morning paper for European football</title>

<!--
================================================================
TABELA — DESIGN TOKENS
================================================================
COLOR
  --paper        #FAF7F2   page background (warm off-white)
  --paper-2      #F2EEE5   secondary paper (filter bar, sub-areas)
  --ink          #111111   primary text
  --ink-2        #3A3A38   secondary text
  --ink-3        #6B6B66   tertiary / metadata
  --rule         #1A1A18   hairline rules at 12% opacity
  --pitch        #0F3D2E   primary brand (deep pitch-green)
  --pitch-2      #1A5A45   pitch tint for hover
  --mustard      #D4A24C   accent / live indicator / highlights
  --crimson      #B33A2E   loss / negative trend (used sparingly)

TYPE
  Display:  "Fraunces", serif         opsz on, 600/700, headlines + wordmark
  Body:     "Inter", sans              400/500/600, UI + paragraphs
  Tabular:  "JetBrains Mono", mono     500/600, scores, stats, table figures

  Scale (px):  12 / 13 / 14 / 16 / 18 / 22 / 28 / 36 / 48 / 64 / 88

SPACING (4-px base):  4  8  12  16  20  24  32  40  56  80  120

RADII
  --r-xs 4  --r-sm 6  --r-md 10  --r-lg 16  --r-pill 999

ELEVATION
  Newspapers don't have shadows. Hierarchy is type, weight, rules, and space.
  Reserve a single "lifted" card style for the audio player only.

GRID
  Mobile:    1-col, 16px gutter
  Tablet:    8-col, 20px gutter
  Desktop:   12-col, 24px gutter, 1240px max content width

VOICE
  Warm, allusive, knowledgeable. Specific over generic. Never shouty.
================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          paper:    "#FAF7F2",
          paper2:   "#F2EEE5",
          ink:      "#111111",
          ink2:     "#3A3A38",
          ink3:     "#6B6B66",
          rule:     "rgba(26,26,24,0.12)",
          rule2:    "rgba(26,26,24,0.22)",
          pitch:    "#0F3D2E",
          pitch2:   "#1A5A45",
          mustard:  "#D4A24C",
          mustard2: "#B5862E",
          crimson:  "#B33A2E",
        },
        fontFamily: {
          serif:  ['Newsreader', 'Georgia', 'serif'],
          sans:   ['"DM Sans"', 'system-ui', 'sans-serif'],
          mono:   ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        maxWidth: { content: '1240px' },
        letterSpacing: { tightish: '-0.01em', tighter2: '-0.02em', tighter3: '-0.03em' },
      }
    }
  }
</script>

<style>
  :root {
    --paper:#FAF7F2; --paper-2:#F2EEE5;
    --ink:#111111; --ink-2:#3A3A38; --ink-3:#6B6B66;
    --rule: rgba(26,26,24,0.12); --rule-2: rgba(26,26,24,0.22);
    --pitch:#0F3D2E; --pitch-2:#1A5A45;
    --mustard:#D4A24C; --crimson:#B33A2E;
  }
  html, body { background: var(--paper); color: var(--ink); }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .font-serif { font-family: 'Newsreader', Georgia, serif; font-optical-sizing: auto; }
  .font-mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum","zero"; }

  /* Editorial display headline — reads like a paper masthead */
  .display {
    font-family: 'Newsreader', Georgia, serif;
    font-optical-sizing: auto;
    font-variation-settings: "opsz" 72;
    letter-spacing: -0.02em;
    line-height: 0.95;
  }
  .h-serif {
    font-family: 'Newsreader', Georgia, serif;
    font-optical-sizing: auto;
    font-variation-settings: "opsz" 48;
    letter-spacing: -0.015em;
  }
  .num { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum","zero"; }

  /* Hairline rules — always 1px, visually consistent against paper */
  .rule-t { border-top: 1px solid var(--rule); }
  .rule-b { border-bottom: 1px solid var(--rule); }
  .rule-l { border-left: 1px solid var(--rule); }
  .rule-r { border-right: 1px solid var(--rule); }
  .rule-strong-b { border-bottom: 1px solid var(--rule-2); }
  .rule-thick-b  { border-bottom: 2px solid var(--ink); }

  /* The "give-and-go" mark — two dots and a connector. Used sparingly. */
  .gng-mark { display: inline-flex; align-items: center; gap: 4px; }
  .gng-dot  { width: 6px; height: 6px; border-radius: 999px; background: var(--pitch); }
  .gng-line { width: 14px; height: 1px; background: var(--pitch); }

  /* Pass-line underline that draws on hover — subtle "give-and-go" affordance */
  .pass-link { position: relative; }
  .pass-link::after {
    content: ""; position: absolute; left:0; right: 100%; bottom: -2px; height: 1px;
    background: currentColor; transition: right 280ms cubic-bezier(.2,.7,.2,1);
  }
  .pass-link:hover::after { right: 0; }

  /* Live dot pulse */
  @keyframes livepulse { 0% { box-shadow: 0 0 0 0 rgba(212,162,76,.55); } 70% { box-shadow: 0 0 0 8px rgba(212,162,76,0); } 100% { box-shadow: 0 0 0 0 rgba(212,162,76,0); } }
  .live-dot { width: 8px; height: 8px; border-radius: 999px; background: var(--mustard); animation: livepulse 1.8s ease-out infinite; }

  /* Sparkline draw-in */
  @keyframes draw { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }
  .spark-path { stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 1100ms cubic-bezier(.2,.7,.2,1) forwards; }

  /* Filter bar sticky shadow only when stuck */
  .sticky-filter.is-stuck { background: rgba(250,247,242,0.92); backdrop-filter: saturate(1.05) blur(6px); border-bottom: 1px solid var(--rule); }

  /* Buttons */
  .btn-pitch { background: var(--pitch); color: #F2EEE5; }
  .btn-pitch:hover { background: var(--pitch-2); }

  /* Selection */
  ::selection { background: rgba(212,162,76,.35); color: var(--ink); }

  /* Disable Tailwind's preflight monospace hijack for buttons */
  button { font-family: inherit; }

  /* Audio player gradient-free progress */
  .audio-track { background: rgba(242,238,229,.4); }
  .audio-fill  { background: var(--mustard); }

  /* Tiny screen reader helper */
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

  /* Smooth focus ring */
  :focus-visible { outline: 2px solid var(--pitch); outline-offset: 2px; border-radius: 4px; }

  /* prevent horizontal jump when scroll bar appears */
  html { scrollbar-gutter: stable; }
</style>
